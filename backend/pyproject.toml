[tool.pytest.ini_options]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=90"
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
omit = ["app/insights/gemini.py"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B"]
# B008: FastAPI uses callables (Depends/Header) as argument defaults by design.
ignore = ["B008"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
