repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: bash -c 'cd backend && ruff check .'
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff (format)
        entry: bash -c 'cd backend && ruff format --check .'
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy (strict)
        entry: bash -c 'cd backend && mypy app'
        language: system
        pass_filenames: false
