name: CI

# One pipeline, one main branch. Each job maps to judging parameters and is a HARD
# gate — a red check means that parameter's evidence is broken. All commands here
# are the same ones run locally (see the evidence docs).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — quality, types, security, testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt pip-audit
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy, strict)
        run: mypy app
      - name: Security — dependency audit (pip-audit)
        run: pip-audit -r requirements.txt
      - name: Tests + coverage gate (>=90%)
        run: pytest

  frontend:
    name: Frontend — types, a11y lint, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint (ESLint + jsx-a11y)
        run: npm run lint
      - name: Format check (Prettier)
        run: npm run format:check
      - name: Unit + accessibility tests (axe)
        run: npm run test:coverage
      - name: Production build
        run: npm run build
